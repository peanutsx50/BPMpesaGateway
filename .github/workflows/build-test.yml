name: build-test
on:
  pull_request:
  push:
    branches:
      - dev
      - "releases/*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Updated to v4 for better performance/security

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, curl, json

      # Fix: Prevent npm token/credential errors in the runner
      - name: Reset NPM config
        run: |
          npm config delete _auth
          npm config delete //registry.npmjs.org/:_authToken
          npm config set registry https://registry.npmjs.org/

      - name: Install Composer dependencies
        working-directory: ./bpmpesagateway
        run: composer install --no-dev --optimize-autoloader

      - name: List plugin files
        run: ls -R ./bpmpesagateway

      # Fix: Use @main to get the latest fixes for the @wp-playground 404 issue
      - name: Run plugin check
        uses: wordpress/plugin-check-action@v1 # Use a stable tag, not @main
        with:
          build-dir: "./bpmpesagateway"
