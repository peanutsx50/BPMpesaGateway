name: Plugin Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["8.1"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mysql, mbstring, xml, curl, json
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: ./bpmpesagateway
        run: composer install --no-interaction --prefer-dist

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Download WordPress
        run: |
          mkdir -p /tmp/wordpress
          cd /tmp/wordpress
          curl -O https://wordpress.org/latest.tar.gz
          tar xzf latest.tar.gz
          mv wordpress/* .
          rm -rf wordpress latest.tar.gz

      - name: Setup WordPress config
        run: |
          cd /tmp/wordpress
          cp wp-config-sample.php wp-config.php
          sed -i "s/database_name_here/wordpress_test/" wp-config.php
          sed -i "s/username_here/root/" wp-config.php
          sed -i "s/password_here/root/" wp-config.php
          sed -i "s/localhost/127.0.0.1/" wp-config.php
          echo "define('WP_DEBUG', true);" >> wp-config.php
          echo "define('WP_DEBUG_LOG', true);" >> wp-config.php
          echo "define('WP_DEBUG_DISPLAY', false);" >> wp-config.php

      - name: Install WordPress
        run: |
          cd /tmp/wordpress
          wp core install \
            --url=http://localhost \
            --title="Test Site" \
            --admin_user=admin \
            --admin_password=admin123 \
            --admin_email=test@example.com \
            --allow-root --skip-email

      - name: Install BuddyPress
        run: |
          cd /tmp/wordpress
          wp plugin install buddypress --activate --allow-root

      - name: Copy plugin to WordPress
        run: |
          rsync -av --exclude='vendor' ./bpmpesagateway/ /tmp/wordpress/wp-content/plugins/bpmpesagateway/

      - name: Activate plugin
        run: |
          cd /tmp/wordpress
          wp plugin activate bpmpesagateway --allow-root

      - name: Run PHP Lint
        working-directory: ./bpmpesagateway
        run: find . -name "*.php" -type f -not -path "./vendor/*" -exec php -l {} \;

      - name: Run Composer validate
        working-directory: ./bpmpesagateway
        run: composer validate

      - name: Check for syntax errors with PHPCS
        working-directory: ./bpmpesagateway
        run: ./vendor/bin/phpcs . --standard=PSR12 --extensions=php --ignore=vendor,node_modules || true

      - name: Verify plugin loads without errors
        run: |
          cd /tmp/wordpress
          wp eval 'echo "Plugin test successful";' --allow-root